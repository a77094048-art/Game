<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحدي حمودي وإيوته 🔥</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #e1bee7);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        @keyframes gradientShift {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .hearts-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .heart {
            position: absolute; color: #e91e63; opacity: 0.6;
            animation: floatUp 4s linear infinite; font-size: 20px;
        }
        @keyframes floatUp {
            0% {transform: translateY(100vh) scale(0); opacity: 0.8;}
            100% {transform: translateY(-10vh) scale(1.5); opacity: 0;}
        }
        .container {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            border-radius: 35px; box-shadow: 0 25px 60px rgba(156,39,176,0.25);
            padding: 20px 18px; max-width: 580px; width: 100%;
            text-align: center; position: relative; z-index: 1;
            border: 1px solid rgba(255,255,255,0.6);
            max-height: 95vh; overflow-y: auto;
        }
        h1 {
            font-size: 2.2rem; font-weight: 900;
            background: linear-gradient(135deg, #c2185b, #7b1fa2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        .score-board {
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(255,255,255,0.8); border-radius: 60px;
            padding: 12px 18px; margin: 12px 0;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); border: 1px solid #f8bbd0;
        }
        .player-score { text-align: center; }
        .player-score .name { font-weight: 700; color: #6a1b9a; font-size: 0.85rem; }
        .player-score .points { font-size: 1.8rem; font-weight: 900; color: #ad1457; }
        .vs { font-size: 1.1rem; font-weight: bold; color: #d81b60; }
        .challenge-bar {
            display: flex; width: 100%; height: 18px; border-radius: 20px;
            overflow: hidden; margin: 10px 0; background: #eee; border: 1px solid #ccc;
        }
        .host-bar { background: #0d47a1; width: 50%; transition: width 0.3s; }
        .guest-bar { background: #e91e63; width: 50%; transition: width 0.3s; }
        .turn-indicator {
            background: #fce4ec; border-radius: 40px; padding: 6px 18px;
            margin: 8px 0; font-weight: 700; color: #c2185b; font-size: 0.95rem;
        }
        .question {
            font-size: 1.2rem; font-weight: 700; color: #4a148c; margin: 12px 0;
            background: #fce4ec; padding: 12px; border-radius: 25px;
        }
        .options { display: grid; gap: 8px; margin: 10px 0; }
        .option-btn {
            background: white; border: 2px solid #e1bee7; padding: 12px;
            border-radius: 35px; font-weight: 600; cursor: pointer; transition: 0.2s;
            color: #4a148c; font-size: 0.95rem; font-family: inherit;
        }
        .option-btn:hover { background: #f3e5f5; border-color: #9c27b0; }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .option-btn.selected {
            background: #9c27b0; color: white; border-color: #7b1fa2;
            box-shadow: 0 4px 10px rgba(156,39,176,0.4);
        }
        .confirm-btn {
            background: #4caf50; color: white; border: none; padding: 12px;
            border-radius: 35px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            margin-top: 10px; width: 100%; transition: 0.2s; font-family: inherit;
        }
        .confirm-btn:disabled { background: #a5d6a7; cursor: not-allowed; }
        .feedback {
            margin-top: 12px; font-weight: 700; min-height: 25px; font-size: 1rem;
        }
        .reset-btn {
            margin-top: 12px; background: #e91e63; color: white; border: none;
            padding: 10px 25px; border-radius: 35px; font-weight: 700;
            cursor: pointer; font-size: 0.9rem; font-family: inherit;
        }
        .chat-section {
            margin-top: 15px; border-top: 1px solid #f0c0d0; padding-top: 10px;
            text-align: right;
        }
        .chat-messages {
            max-height: 120px; overflow-y: auto; background: #fff5f8;
            border-radius: 15px; padding: 8px; margin-bottom: 5px; font-size: 0.85rem;
        }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input {
            flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #e1bee7;
            font-family: inherit; font-size: 0.85rem;
        }
        .chat-input-row button {
            background: #9c27b0; color: white; border: none; border-radius: 20px;
            padding: 8px 15px; font-family: inherit; font-weight: 600; cursor: pointer;
        }
        .join-area { margin: 15px 0; }
        .join-area input {
            padding: 10px; border-radius: 25px; border: 1px solid #e1bee7;
            width: 70%; margin: 5px; font-family: inherit; text-align: center;
        }
        .join-area button {
            padding: 10px 18px; border-radius: 25px; border: none;
            background: #9c27b0; color: white; font-weight: 700; cursor: pointer;
            margin: 5px; font-family: inherit;
        }
        .room-id-display {
            background: #e8eaf6; border: 2px dashed #0d47a1;
            border-radius: 12px; padding: 10px; margin: 10px 0;
            font-weight: 800; color: #0d47a1; font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .status { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
<div class="hearts-container" id="heartsContainer"></div>
<div class="container">
    <h1>💖 تحدي حمودي وإيوته 💖</h1>
    <div class="score-board">
        <div class="player-score"><div class="name">🦅 حمودي</div><div class="points" id="myScore">0</div></div>
        <div class="vs">⚔️</div>
        <div class="player-score"><div class="name">🌸 إيوته</div><div class="points" id="peerScore">0</div></div>
    </div>
    <div class="challenge-bar">
        <div class="host-bar" id="hostBar" style="width:50%"></div>
        <div class="guest-bar" id="guestBar" style="width:50%"></div>
    </div>

    <div class="join-area" id="joinArea">
        <div><input type="text" id="roomIdInput" placeholder="أدخل معرف الغرفة (أو اتركه فارغًا لإنشاء جديدة)"></div>
        <button id="joinBtn">🚪 دخول / إنشاء الغرفة</button>
        <div id="roomIdDisplay" class="room-id-display" style="display:none;"></div>
        <div class="status" id="statusText">أدخل معرف الغرفة أو اتركه فارغًا لإنشاء غرفة جديدة</div>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="turn-indicator" id="turnIndicator"></div>
        <div class="question" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <button class="confirm-btn" id="confirmBtn" onclick="confirmAnswer()">تأكيد الإجابة</button>
        <div class="feedback" id="feedbackMsg"></div>
        <button class="reset-btn" onclick="resetGame()">🔄 إعادة اللعبة</button>

        <div class="chat-section">
            <div style="font-weight:700;color:#6a1b9a;margin-bottom:5px;">💬 دردشة</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="اكتب رسالة...">
                <button onclick="sendChat()">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== رابط الخادم الخاص بك ====================
    const SERVER_URL = 'wss://gamee-beqx.onrender.com';

    // ==================== 100 سؤال (موجودة بالكامل لكن اختصرت هنا للعرض) ====================
    const questions = [
        { question: "ما هي عاصمة سوريا؟ 🇸🇾", options: ["دمشق", "حلب", "حمص", "اللاذقية"], correct: 0 },
        { question: "كم عدد محافظات سوريا؟ 🗺️", options: ["12", "14", "13", "15"], correct: 1 },
        { question: "ما هي عاصمة البرازيل؟ 🇧🇷", options: ["ريو دي جانيرو", "ساو باولو", "برازيليا", "سلفادور"], correct: 2 }
        // ... (أضف هنا بقية الأسئلة حتى 100)
    ];

    let ws, roomId, myRole = -1, scores = [0,0], currentTurn = 0, currentIndex = 0, shuffledQuestions = [], selectedOptionIndex = null;
    const joinArea = document.getElementById('joinArea'), gameArea = document.getElementById('gameArea'), joinBtn = document.getElementById('joinBtn'),
          roomIdInput = document.getElementById('roomIdInput'), statusText = document.getElementById('statusText'),
          roomIdDisplay = document.getElementById('roomIdDisplay'), confirmBtn = document.getElementById('confirmBtn');

    function connectWebSocket() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => { statusText.textContent = '✅ متصل بالخادم'; joinBtn.onclick = handleJoin; };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'error') alert(data.message);
            else if (data.type === 'joined') { myRole = data.role; joinArea.style.display = 'none'; gameArea.style.display = 'block'; updateScores(); }
            else if (data.type === 'start') { if (myRole === 0) { shuffledQuestions = shuffleArray([...questions]); ws.send(JSON.stringify({ type: 'state', roomId, questions: shuffledQuestions })); } startGame(); }
            else if (data.type === 'state') { shuffledQuestions = data.questions; startGame(); }
            else if (data.type === 'answer') { scores = data.scores; currentTurn = data.turn; currentIndex = data.currentIndex; updateScores(); if (currentIndex >= 100 || scores[0] >= 15 || scores[1] >= 15) endGame(); else showQuestion(); }
            else if (data.type === 'chat') addChatMessage(data.chat);
            else if (data.type === 'reset') { scores = [0,0]; currentTurn = 0; currentIndex = 0; updateScores(); showQuestion(); }
        };
        ws.onerror = () => statusText.textContent = '❌ فشل الاتصال بالخادم';
    }

    function handleJoin() {
        roomId = roomIdInput.value.trim() || generateRoomId();
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'join', roomId }));
            if (!roomIdInput.value.trim()) {
                roomIdDisplay.textContent = '🆔 معرف الغرفة: ' + roomId;
                roomIdDisplay.style.display = 'block';
            }
        }
    }

    function generateRoomId() { return 'game-' + Math.random().toString(36).substr(2, 8); }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
    function startGame() { currentIndex = 0; scores = [0,0]; updateScores(); showQuestion(); }

    function showQuestion() {
        if (currentIndex >= shuffledQuestions.length || scores[0] >= 15 || scores[1] >= 15) { endGame(); return; }
        const q = shuffledQuestions[currentIndex];
        document.getElementById('questionText').textContent = q.question;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = ''; selectedOptionIndex = null;
        const isMyTurn = (currentTurn === myRole);
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
            btn.disabled = !isMyTurn;
            btn.onclick = () => { if (!isMyTurn) return; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedOptionIndex = i; };
            container.appendChild(btn);
        });
        confirmBtn.style.display = 'block'; confirmBtn.disabled = !isMyTurn;
        document.getElementById('turnIndicator').textContent = isMyTurn ? (myRole === 0 ? '🦅 دور حمودي' : '🌸 دور إيوته') : (myRole === 0 ? '🌸 انتظري إيوته' : '🦅 انتظري حمودي');
    }

    function confirmAnswer() {
        if (selectedOptionIndex === null || currentTurn !== myRole) return;
        const q = shuffledQuestions[currentIndex], correct = (selectedOptionIndex === q.correct);
        if (correct) { scores[myRole]++; document.getElementById('feedbackMsg').innerHTML = '✅ ' + (myRole === 0 ? 'أحسنت يا حمودي!' : 'برافو يا إيوته!'); }
        else { document.getElementById('feedbackMsg').innerHTML = '❌ ' + (myRole === 0 ? 'غلط يا حمودي!' : 'غلط يا إيوته!'); }
        updateScores(); confirmBtn.disabled = true;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        ws.send(JSON.stringify({ type: 'answer', roomId, correct, questionIndex: currentIndex }));
    }

    function updateScores() {
        document.getElementById('myScore').textContent = myRole !== -1 ? scores[myRole] : 0;
        document.getElementById('peerScore').textContent = myRole !== -1 ? scores[1-myRole] : 0;
        const total = scores[0] + scores[1];
        document.getElementById('hostBar').style.width = (total === 0 ? 50 : scores[0]/total*100) + '%';
        document.getElementById('guestBar').style.width = (total === 0 ? 50 : scores[1]/total*100) + '%';
    }

    function endGame() {
        const winner = scores[0] >= 15 ? 0 : scores[1] >= 15 ? 1 : -1;
        let msg = winner === 0 ? '🦅 حمودي هو الفائز!' : winner === 1 ? '🌸 إيوته هي الفائزة!' : '🤝 تعادل!';
        document.getElementById('questionText').textContent = 'انتهى التحدي!';
        document.getElementById('optionsContainer').innerHTML = ''; confirmBtn.style.display = 'none';
        document.getElementById('feedbackMsg').innerHTML = msg;
    }

    function resetGame() { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'reset', roomId })); }

    function sendChat() {
        const input = document.getElementById('chatInput'), text = input.value.trim();
        if (text && myRole !== -1) ws.send(JSON.stringify({ type: 'chat', roomId, text, sender: myRole }));
        input.value = '';
    }

    function addChatMessage(chatObj) {
        const div = document.getElementById('chatMessages');
        div.innerHTML += `<div><strong style="color:${chatObj.sender===0?'#0d47a1':'#e91e63'}">${chatObj.sender===0?'حمودي':'إيوته'}:</strong> ${chatObj.text}</div>`;
        div.scrollTop = div.scrollHeight;
    }

    function createHearts() {
        const container = document.getElementById('heartsContainer'), emojis = ['💖','💕','💗','💘','💝'];
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('span'); heart.className = 'heart';
            heart.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
            heart.style.left = Math.random()*100+'%';
            heart.style.animationDelay = Math.random()*4+'s';
            heart.style.animationDuration = Math.random()*3+3+'s';
            container.appendChild(heart);
        }
    }

    createHearts();
    connectWebSocket();
</script>
</body>
</html>
