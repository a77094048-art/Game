<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تحدي حمودي وإيوته 🔥</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #e1bee7);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        @keyframes gradientShift {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .hearts-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .heart {
            position: absolute; color: #e91e63; opacity: 0.6;
            animation: floatUp 4s linear infinite; font-size: 20px;
        }
        @keyframes floatUp {
            0% {transform: translateY(100vh) scale(0); opacity: 0.8;}
            100% {transform: translateY(-10vh) scale(1.5); opacity: 0;}
        }
        .container {
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            border-radius: 35px; box-shadow: 0 25px 60px rgba(156,39,176,0.25);
            padding: 25px 20px; max-width: 550px; width: 100%;
            text-align: center; position: relative; z-index: 1;
            border: 1px solid rgba(255,255,255,0.6);
        }
        h1 {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(135deg, #c2185b, #7b1fa2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        .score-board {
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(255,255,255,0.8); border-radius: 60px;
            padding: 15px 20px; margin: 15px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f8bbd0;
        }
        .player-score { text-align: center; }
        .player-score .name { font-weight: 700; color: #6a1b9a; font-size: 0.9rem; }
        .player-score .points { font-size: 2rem; font-weight: 900; color: #ad1457; }
        .vs { font-size: 1.2rem; font-weight: bold; color: #d81b60; }
        .peer-area {
            background: #fff0f5; border-radius: 20px; padding: 15px;
            margin: 15px 0; font-size: 0.9rem;
        }
        .peer-area input {
            padding: 10px; border-radius: 30px; border: 1px solid #e1bee7;
            width: 60%; margin: 5px; font-family: inherit; text-align: center;
        }
        .peer-area button {
            padding: 10px 20px; border-radius: 30px; border: none;
            background: #9c27b0; color: white; font-weight: 700; cursor: pointer;
            margin: 5px; font-family: inherit;
        }
        .turn-indicator {
            background: #fce4ec; border-radius: 40px; padding: 8px 20px;
            margin: 10px 0; font-weight: 700; color: #c2185b; font-size: 1rem;
        }
        .question {
            font-size: 1.3rem; font-weight: 700; color: #4a148c; margin: 15px 0;
            background: #fce4ec; padding: 15px; border-radius: 25px;
        }
        .options { display: grid; gap: 10px; margin: 15px 0; }
        .option-btn {
            background: white; border: 2px solid #e1bee7; padding: 14px;
            border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s;
            color: #4a148c; font-size: 1rem; font-family: inherit;
        }
        .option-btn:hover { background: #f3e5f5; border-color: #9c27b0; }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .feedback {
            margin-top: 15px; font-weight: 700; min-height: 30px; font-size: 1.1rem;
        }
        .reset-btn {
            margin-top: 15px; background: #e91e63; color: white; border: none;
            padding: 10px 30px; border-radius: 40px; font-weight: 700;
            cursor: pointer; font-size: 0.9rem; font-family: inherit;
        }
        .status { font-size: 0.8rem; color: #666; margin: 5px 0; }
    </style>
</head>
<body>
<div class="hearts-container" id="heartsContainer"></div>
<div class="container">
    <h1>💖 تحدي حمودي وإيوته 💖</h1>
    <div class="score-board">
        <div class="player-score">
            <div class="name">🦅 حمودي</div>
            <div class="points" id="myScore">0</div>
        </div>
        <div class="vs">⚔️ VS ⚔️</div>
        <div class="player-score">
            <div class="name">🌸 إيوته</div>
            <div class="points" id="peerScore">0</div>
        </div>
    </div>

    <div class="peer-area" id="peerArea">
        <div>📱 معرف غرفتك: <strong id="myPeerId">-</strong></div>
        <input type="text" id="remotePeerId" placeholder="أدخل معرف غرفة اللاعب الآخر هنا">
        <button onclick="connectToPeer()">📞 انضم للغرفة</button>
        <div class="status" id="statusText">في انتظار الاتصال...</div>
    </div>

    <div id="gameArea" style="display: none;">
        <div class="turn-indicator" id="turnIndicator"></div>
        <div class="question" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="feedback" id="feedbackMsg"></div>
        <button class="reset-btn" onclick="resetGame()">🔄 إعادة اللعبة</button>
    </div>
</div>

<script>
    const questions = [
        { question: "عاصمة اليابان؟ 🇯🇵", options: ["طوكيو", "سول", "بكين", "بانكوك"], correct: 0 },
        { question: "عدد الكواكب في المجموعة الشمسية؟ 🌌", options: ["7", "8", "9", "10"], correct: 1 },
        { question: "مكتشف الجاذبية؟ 🍎", options: ["أينشتاين", "نيوتن", "تسلا", "جاليليو"], correct: 1 },
        { question: "أطول نهر في العالم؟ 🌊", options: ["الأمازون", "النيل", "المسيسيبي", "الدانوب"], correct: 1 },
        { question: "متى انتهت الحرب العالمية الثانية؟ ⚔️", options: ["1943", "1945", "1947", "1950"], correct: 1 },
        { question: "العنصر الكيميائي رمزه O؟ 🧪", options: ["ذهب", "فضة", "أكسجين", "حديد"], correct: 2 },
        { question: "مؤسس مايكروسوفت؟ 💻", options: ["ستيف جوبز", "بيل غيتس", "مارك زوكربيرغ", "إيلون ماسك"], correct: 1 },
        { question: "عدد الدول العربية؟ 🌍", options: ["20", "21", "22", "23"], correct: 2 },
        { question: "أعلى قمة جبلية؟ 🏔️", options: ["كليمنجارو", "إيفرست", "أكونكاجوا", "مون بلان"], correct: 1 },
        { question: "مخترع المصباح الكهربائي؟ 💡", options: ["توماس إديسون", "نيكولا تيسلا", "ألكسندر بيل", "جيمس وات"], correct: 0 },
        { question: "عاصمة كندا؟ 🇨🇦", options: ["تورنتو", "فانكوفر", "أوتاوا", "مونتريال"], correct: 2 },
        { question: "كم لاعب كرة قدم في الفريق الواحد؟ ⚽", options: ["9", "10", "11", "12"], correct: 2 },
        { question: "أمير الشعراء العربي؟ 📜", options: ["أحمد شوقي", "المتنبي", "نزار قباني", "محمود درويش"], correct: 0 },
        { question: "عملة اليابان؟ 💴", options: ["اليوان", "الوون", "الين", "الدولار"], correct: 2 },
        { question: "أين تقع جزيرة هاواي؟ 🏝️", options: ["الأطلسي", "الهندي", "المتجمد الشمالي", "الهادئ"], correct: 3 },
        { question: "أسرع حيوان بري؟ 🐆", options: ["الفهد", "الأسد", "الحصان", "الغزال"], correct: 0 },
        { question: "أول رائد فضاء هبط على القمر؟ 🚀", options: ["يوري غاغارين", "نيل أرمسترونغ", "باز ألدرين", "جون غلين"], correct: 1 },
        { question: "أكبر دولة عربية مساحة؟ 🗺️", options: ["السعودية", "مصر", "الجزائر", "السودان"], correct: 2 },
        { question: "كم لوناً في قوس قزح؟ 🌈", options: ["5", "6", "7", "8"], correct: 2 },
        { question: "كاتب (الجمهورية) من الفلاسفة؟ 🏛️", options: ["سقراط", "أفلاطون", "أرسطو", "فيثاغورس"], correct: 1 }
    ];

    let peer = null, conn = null, myId = '';
    let myScore = 0, peerScoreVal = 0;
    let currentTurn = 0;
    let currentQuestionIndex = 0;
    let shuffledQuestions = [];
    let gameStarted = false;

    const myScoreEl = document.getElementById('myScore');
    const peerScoreEl = document.getElementById('peerScore');
    const peerArea = document.getElementById('peerArea');
    const gameArea = document.getElementById('gameArea');
    const myPeerIdEl = document.getElementById('myPeerId');
    const remotePeerIdInput = document.getElementById('remotePeerId');
    const statusText = document.getElementById('statusText');
    const turnIndicator = document.getElementById('turnIndicator');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackMsg = document.getElementById('feedbackMsg');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startGame() {
        gameStarted = true;
        peerArea.style.display = 'none';
        gameArea.style.display = 'block';
        shuffledQuestions = shuffleArray([...questions]);
        currentQuestionIndex = 0;
        myScore = 0;
        peerScoreVal = 0;
        updateScores();
        if (!remotePeerIdInput.value) {
            currentTurn = 0;
        } else {
            currentTurn = 1;
        }
        sendGameState();
        showCurrentQuestion();
    }

    function sendGameState() {
        if (!conn) return;
        conn.send({
            type: 'state',
            myScore,
            peerScore: peerScoreVal,
            currentTurn,
            currentQuestionIndex,
            shuffledQuestions
        });
    }

    function updateScores() {
        myScoreEl.textContent = myScore;
        peerScoreEl.textContent = peerScoreVal;
    }

    function showCurrentQuestion() {
        if (currentQuestionIndex >= shuffledQuestions.length) {
            questionText.textContent = 'انتهت الأسئلة! 🎉';
            optionsContainer.innerHTML = '';
            let winnerMsg = '';
            if (myScore > peerScoreVal) winnerMsg = '🦅 حمودي هو الفائز! لكن إيوته الأجمل 😍';
            else if (peerScoreVal > myScore) winnerMsg = '🌸 إيوته هي الفائزة! ذكية ومبدعة 💖';
            else winnerMsg = '🤝 تعادل! أنتم الأروع معاً 💑';
            feedbackMsg.innerHTML = `<span style="color:#ad1457; font-size:1.3rem;">${winnerMsg}</span>`;
            return;
        }
        const q = shuffledQuestions[currentQuestionIndex];
        questionText.textContent = q.question;
        optionsContainer.innerHTML = '';
        const isMyTurn = (currentTurn === 0);
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.disabled = !isMyTurn;
            btn.onclick = () => handleAnswer(i);
            optionsContainer.appendChild(btn);
        });
        turnIndicator.textContent = isMyTurn ? '🦅 دور حمودي' : '🌸 دور إيوته';
    }

    function handleAnswer(selectedIndex) {
        if (currentTurn !== 0 || !gameStarted) return;
        const q = shuffledQuestions[currentQuestionIndex];
        const correct = (selectedIndex === q.correct);
        if (correct) {
            myScore++;
            feedbackMsg.innerHTML = '✅ <span style="color:green">أحسنت يا حمودي! 🦅</span>';
        } else {
            feedbackMsg.innerHTML = '❌ <span style="color:red">غلط يا حمودي! 😅</span>';
        }
        updateScores();
        conn.send({
            type: 'answer',
            correct,
            myScore,
            currentQuestionIndex
        });
        currentTurn = 1;
        disableOptions();
        setTimeout(() => {
            currentQuestionIndex++;
            showCurrentQuestion();
            sendGameState();
        }, 1500);
    }

    function disableOptions() {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    function initPeer() {
        peer = new Peer(undefined, {
            host: '0.peerjs.com',
            port: 443,
            secure: true
        });

        peer.on('open', (id) => {
            myId = id;
            myPeerIdEl.textContent = id;
            statusText.textContent = '✅ جاهز! شارك المعرف مع اللاعب الآخر.';
        });

        peer.on('connection', (incomingConn) => {
            if (conn) { incomingConn.close(); return; }
            conn = incomingConn;
            setupConnection();
            startGame();
        });

        peer.on('error', (err) => {
            console.error(err);
            statusText.textContent = '❌ خطأ: ' + err.message;
        });
    }

    function connectToPeer() {
        const remoteId = remotePeerIdInput.value.trim();
        if (!remoteId || remoteId === myId) {
            alert('الرجاء إدخال معرف صحيح');
            return;
        }
        statusText.textContent = '🔄 جاري الاتصال...';
        conn = peer.connect(remoteId, { reliable: true });
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            statusText.textContent = '✅ تم الاتصال! ابدأ التحدي 💑';
            if (!gameStarted) startGame();
        });
        conn.on('data', (data) => {
            handleIncomingData(data);
        });
        conn.on('close', () => {
            statusText.textContent = 'انقطع الاتصال.';
            gameArea.style.display = 'none';
            peerArea.style.display = 'block';
        });
        conn.on('error', (err) => {
            console.error(err);
            statusText.textContent = '❌ خطأ في الاتصال.';
        });
    }

    function handleIncomingData(data) {
        if (data.type === 'state') {
            if (!gameStarted) {
                myScore = data.peerScore;
                peerScoreVal = data.myScore;
                currentTurn = data.currentTurn;
                currentQuestionIndex = data.currentQuestionIndex;
                shuffledQuestions = data.shuffledQuestions;
                updateScores();
                showCurrentQuestion();
                gameStarted = true;
                peerArea.style.display = 'none';
                gameArea.style.display = 'block';
            } else {
                peerScoreVal = data.myScore;
                myScore = data.peerScore;
                updateScores();
                showCurrentQuestion();
            }
        } else if (data.type === 'answer') {
            if (data.correct) {
                peerScoreVal++;
                feedbackMsg.innerHTML = '✅ <span style="color:green">برافو يا إيوته! ذكية كعادتها 🌸</span>';
            } else {
                feedbackMsg.innerHTML = '❌ <span style="color:red">غلط يا إيوته! ركزي يا عمري 😘</span>';
            }
            updateScores();
            currentQuestionIndex = data.currentQuestionIndex + 1;
            currentTurn = 0;
            showCurrentQuestion();
        }
    }

    function resetGame() {
        gameStarted = false;
        currentQuestionIndex = 0;
        myScore = 0;
        peerScoreVal = 0;
        updateScores();
        shuffledQuestions = shuffleArray([...questions]);
        gameArea.style.display = 'none';
        peerArea.style.display = 'block';
        if (conn) {
            conn.send({ type: 'reset' });
        }
    }

    function createHearts() {
        const container = document.getElementById('heartsContainer');
        const emojis = ['💖','💕','💗','💘','💝'];
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('span');
            heart.className = 'heart';
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 4 + 's';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            container.appendChild(heart);
        }
    }

    createHearts();
    initPeer();
</script>
</body>
</html>
